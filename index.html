<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Deeply Sorry</title>
    <style>
        :root {
            --primary-pink: #ff758c;
            --secondary-pink: #ff7eb3;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #74ebd5 0%, #acb6e5 100%); /* Softer, calming gradient */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Floating Hearts Background Animation */
        .bg-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.4);
            animation: float 6s linear infinite;
            bottom: -50px;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Main Content Container */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .flower {
            font-size: 100px;
            margin: 20px 0;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        .sorry-text {
            font-size: 1.2rem;
            margin: 5px 0;
            opacity: 0.9;
        }

        .highlight {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 20px;
            animation: glow 1.5s infinite alternate;
        }

        /* Keyframes */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #ff758c; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #ff7eb3; }
        }

    </style>
</head>
<body>

    <div class="bg-hearts" id="heartContainer"></div>

    <div class="container">
        <h1>I am Really Sorry 😔</h1>
        <div class="flower">🌹</div>
        <div class="sorry-text">I know I messed up.</div>
        <div class="sorry-text">I value you more than words can say.</div>
        <div class="sorry-text">Please give me a chance to make it right.</div>
        <p class="highlight">Please Forgive Me ❤️</p>
    </div>

    <script>
        // Script to generate random floating hearts
        function createHeart() {
            const container = document.getElementById('heartContainer');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.opacity = Math.random();
            
            container.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 300);
    </script>

</body>
</html>
